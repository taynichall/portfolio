<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Arimo:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="./image-slot.js"></script>
  <style>
    body { margin:0; font-family:'Arimo',Arial,sans-serif; background:#fff; color:#111; }
    a { color:inherit; text-decoration:none; }
    a:hover { opacity:0.75; }
    * { box-sizing:border-box; }
    tr:hover td { background:#fafafa; }
  </style>
</helmet>

<nav style="display:flex;justify-content:center;align-items:center;gap:44px;padding:16px 40px;background:#fff;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,0.07);">
  <a href="./index.html" style="font-family:'Arimo',sans-serif;font-weight:600;font-size:15px;">My Work</a>
  <a href="./About.dc.html" style="font-family:'Arimo',sans-serif;font-weight:600;font-size:15px;">About Me</a>
  <a href="./MorePosts.dc.html" style="font-family:'Arimo',sans-serif;font-weight:700;font-size:15px;padding:7px 22px;background:#FFDDB0;border-radius:100px;">More Posts</a>
</nav>

<section style="max-width:1200px;margin:0 auto;padding:80px 48px 100px;">
  <div style="font-family:'Bungee',cursive;font-size:11px;letter-spacing:3px;display:inline-block;border-bottom:2px solid #111;padding-bottom:3px;margin-bottom:18px;">MORE POSTS</div>
  <h2 style="font-family:'Arimo',sans-serif;font-weight:700;font-size:36px;line-height:1.2;margin:0 0 12px;">An archive of top-performing content</h2>


  <div style="display:flex;gap:10px;margin-bottom:36px;">
    {{ filterButtonEls }}
  </div>

  <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
    <thead>
      <tr style="border-bottom:2px solid #111;">
        <th style="font-family:'Bungee',cursive;font-size:10px;letter-spacing:2px;text-align:center;padding:0 0 14px;color:#888;font-weight:400;">PREVIEW</th>
        <th style="font-family:'Bungee',cursive;font-size:10px;letter-spacing:2px;text-align:center;padding:0 0 14px;color:#888;font-weight:400;">PLATFORM</th>
        <th style="font-family:'Bungee',cursive;font-size:10px;letter-spacing:2px;text-align:center;padding:0 0 14px;color:#888;font-weight:400;">TYPE</th>
        <th style="font-family:'Bungee',cursive;font-size:10px;letter-spacing:2px;text-align:center;padding:0 0 14px;color:#888;font-weight:400;">VIEWS</th>
        <th style="font-family:'Bungee',cursive;font-size:10px;letter-spacing:2px;text-align:center;padding:0 0 14px;color:#888;font-weight:400;">ENGAGEMENTS</th>
        <th style="font-family:'Bungee',cursive;font-size:10px;letter-spacing:2px;text-align:center;padding:0 0 14px;color:#888;font-weight:400;">LINK</th>
      </tr>
    </thead>
    <tbody>
      <sc-for list="{{ filteredPosts }}" as="post" hint-placeholder-count="10">
        <tr style="border-bottom:1px solid #f0f0f0;">
          <td style="padding:12px 0;text-align:center;vertical-align:middle;"><div style="display:flex;justify-content:center;">{{ post.thumbEl }}</div></td>
          <td style="padding:12px 0;text-align:center;vertical-align:middle;">{{ post.platformEl }}</td>
          <td style="padding:12px 0;font-family:'Arimo',sans-serif;font-size:13px;color:#888;text-align:center;vertical-align:middle;">{{ post.type }}</td>
          <td style="padding:12px 0;font-family:'Bungee',cursive;font-size:15px;text-align:center;vertical-align:middle;">{{ post.viewsFmt }}</td>
          <td style="padding:12px 0;font-family:'Arimo',sans-serif;font-size:14px;color:#666;text-align:center;vertical-align:middle;">{{ post.engFmt }}</td>
          <td style="padding:12px 0;text-align:center;vertical-align:middle;">
            <a href="{{ post.link }}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:#CEDDFE;border-radius:50%;font-size:15px;">↗</a>
          </td>
        </tr>
      </sc-for>
    </tbody>
  </table>
</section>
</x-dc>

      { id: 12, platform:'Instagram', type:'Video',    views:2673000,  eng:274000,  link:'https://www.instagram.com/reel/DFNKv6LS0rx/',                   thumb:'./uploads/pasted-1784382408672-0.png' },

  renderVals() {
    const { activeFilter, posts } = this.state;

    const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M' : n >= 1e3 ? Math.round(n/1e3) + 'K' : String(n);
    const ce = React.createElement;
    const icons = {
      'Instagram': ce('svg', { width:22, height:22, viewBox:'0 0 24 24', fill:'none', stroke:'#111', strokeWidth:2, strokeLinecap:'round' },
        ce('rect', { x:2, y:2, width:20, height:20, rx:5 }), ce('circle', { cx:12, cy:12, r:4.5 }), ce('circle', { cx:17.5, cy:6.5, r:1, fill:'#111', stroke:'none' })),
      'TikTok': ce('svg', { width:22, height:22, viewBox:'0 0 24 24', fill:'#111' },

    const platformKey = { 'Instagram':'instagram', 'TikTok':'tiktok', 'X/Twitter':'twitter' };
    const filters = [
      { key:'all', label:'All' }, { key:'instagram', label:'Instagram' },
      { key:'tiktok', label:'TikTok' }, { key:'twitter', label:'X/Twitter' }
    ];
    const filterButtonEls = filters.map(f =>
      React.createElement('button', {
        key: f.key,
        onClick: () => this.setState({ activeFilter: f.key }),
        style: { background: activeFilter === f.key ? '#FFDDB0' : '#f0f0f0', border:'none', borderRadius:'100px', padding:'8px 22px', fontFamily:"'Arimo',sans-serif", fontWeight:700, fontSize:'14px', cursor:'pointer' }
      }, f.label)
    );

    const filteredPosts = posts
      .filter(p => activeFilter === 'all' || platformKey[p.platform] === activeFilter)
      .map(p => ({
        ...p,
        viewsFmt: fmt(p.views),
        engFmt: fmt(p.eng),
        platformEl: icons[p.platform],
        thumbEl: p.thumb
          ? React.createElement('img', { key: p.id, src: p.thumb, alt:'thumbnail', style:{ width:'72px', height:'72px', objectFit:'cover', borderRadius:'10px', display:'block' } })

    return { filterButtonEls, filteredPosts };
  }

</script>
</body>
</html>
